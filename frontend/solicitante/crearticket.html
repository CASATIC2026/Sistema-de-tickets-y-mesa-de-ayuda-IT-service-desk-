<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticket SV    </title>
    <style>
        
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}


body {
    min-height: 100vh;
    background: linear-gradient(120deg, #5d7fa1, #1e40af);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}


.header {
    background: white;
    padding: 25px 50px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    text-align: center;
    animation: slideDown 0.8s ease;
}

.header h1 {
    color: #ff4e50;
    font-size: 30px;
    letter-spacing: 2px;
}


@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


.form-container {
    background: white;
    padding: 40px;
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}


.form-container h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #ff4e50;
}


.form-container h2 {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 18px;
    color: #333;
}


label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: 600;
    color: #555;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="file"],
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 2px solid #f3f3f3;
    font-size: 14px;
    transition: 0.3s ease;
    outline: none;
}


input:focus,
textarea:focus {
    border-color: #ff4e50;
    box-shadow: 0 0 10px rgba(255,78,80,0.3);
}


textarea {
    margin-top: 15px;
    min-height: 100px;
    resize: none;
}


button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #ff4e50, #fc913a);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}


button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}


button:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>

    <div class="header">
        <h1>Path Support</h1>
    </div>

    <div class="form-container">
        <h1>Crear Ticket</h1>
        <form action="#" method="post">
            
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required>

            <label for="telefono">Número de Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ingresa tu teléfono" required>


            <h2>Detalles del Ticket</h2>
            <form action="#" method="post" enctype="multipart/form-data">
                <label for="resumen">Resumen del Caso</label>
                <input type="text" id="resumen" name="resumen" required><br><br>
        </form>

        

        <textarea name="descripcion" placeholder="detalles"></textarea>

        <div class="archivos">
            <label for="archivo">Agregar Archivo</label>
            <input type="file" id="archivo" name="archivo">
        </div>

        <button type="submit">Enviar Ticket</button>
    </div>

    
</body>
</html>
