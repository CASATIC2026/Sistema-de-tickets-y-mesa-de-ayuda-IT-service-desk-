<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tecnico</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* COLORES */
        :root {
            --azul-oscuro: #0d1b2a;
            --azul-medio: #1b263b;
            --azul-claro: #415a77;
            --gris-claro: #f4f6f8;
            --blanco: #ffffff;
            --verde: #2a9d8f;
        }

        body {
            background-color: var(--gris-claro);
            color: var(--azul-oscuro);
        }

        header {
            background-color: var(--azul-oscuro);
            color: var(--blanco);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 26px;
        }

        header p {
            font-size: 14px;
            opacity: 0.8;
        }

        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        section {
            background-color: var(--blanco);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        section h2 {
            margin-bottom: 15px;
            color: var(--azul-medio);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: var(--azul-claro);
            color: var(--blanco);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            background-color: var(--verde);
            color: var(--blanco);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background-color: #21867a;
        }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>

</head>
<body>

<header>
    <h1>Panel del Técnico</h1>
    <p>Gestión y resolución de tickets</p>
</header>

<main>

    <!-- LISTA DE TICKETS -->
    <section>
        <h2>Tickets Abiertos</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Prioridad</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="listaTickets">
                <!-- Cargados desde backend -->
            </tbody>
        </table>
    </section>

    <!-- RESPUESTA -->
    <section>
        <h2>Responder Ticket</h2>

        <form>
            <label>ID del Ticket</label>
            <input type="number" placeholder="Ej: 1" required>

            <label>Respuesta del Técnico</label>
            <textarea rows="5" placeholder="Describa la solución..." required></textarea>

            <button type="submit">Enviar Respuesta</button>
        </form>
    </section>

</main>

<footer>
    Mesa de Ayuda © 2026
</footer>

</body>
</html>
